<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:18px; background:var(--brand-bg-1); color:var(--brand-text); }
  .lbl { font-family:var(--font-mono); font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--brand-faint); }
  
</style></head><body><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px">
<div style="display:flex;flex-direction:column;gap:6px">
  <div style="height:62px;border-radius:var(--r-md);background:#090b11;border:1px solid var(--brand-line)"></div>
  <div style="display:flex;flex-direction:column;gap:1px">
    <span style="font-family:var(--font-mono);font-size:11px;color:var(--brand-text)">bg-1 / page</span>
    <span class="lbl">#090b11</span>
  </div></div><div style="display:flex;flex-direction:column;gap:6px">
  <div style="height:62px;border-radius:var(--r-md);background:#0d1018;border:1px solid var(--brand-line)"></div>
  <div style="display:flex;flex-direction:column;gap:1px">
    <span style="font-family:var(--font-mono);font-size:11px;color:var(--brand-text)">bg-2</span>
    <span class="lbl">#0d1018</span>
  </div></div><div style="display:flex;flex-direction:column;gap:6px">
  <div style="height:62px;border-radius:var(--r-md);background:#070910;border:1px solid var(--brand-line)"></div>
  <div style="display:flex;flex-direction:column;gap:1px">
    <span style="font-family:var(--font-mono);font-size:11px;color:var(--brand-text)">bg-3</span>
    <span class="lbl">#070910</span>
  </div></div><div style="display:flex;flex-direction:column;gap:6px">
  <div style="height:62px;border-radius:var(--r-md);background:#11141d;border:1px solid var(--brand-line)"></div>
  <div style="display:flex;flex-direction:column;gap:1px">
    <span style="font-family:var(--font-mono);font-size:11px;color:var(--brand-text)">surface</span>
    <span class="lbl">#11141d</span>
  </div></div><div style="display:flex;flex-direction:column;gap:6px">
  <div style="height:62px;border-radius:var(--r-md);background:#161b27;border:1px solid var(--brand-line)"></div>
  <div style="display:flex;flex-direction:column;gap:1px">
    <span style="font-family:var(--font-mono);font-size:11px;color:var(--brand-text)">surface-2</span>
    <span class="lbl">#161b27</span>
  </div></div>
</div></body></html>
