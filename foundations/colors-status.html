<!-- @dsCard group="Colors" viewport="700x150" name="Status" subtitle="Semantic state colors" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:18px; background:var(--brand-bg-1); color:var(--brand-text); }
  .lbl { font-family:var(--font-mono); font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--brand-faint); }
  
</style></head><body><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
<div style="display:flex;flex-direction:column;gap:6px">
  <div style="height:62px;border-radius:var(--r-md);background:#5bd0a0;border:1px solid var(--brand-line)"></div>
  <div style="display:flex;flex-direction:column;gap:1px">
    <span style="font-family:var(--font-mono);font-size:11px;color:var(--brand-text)">ok</span>
    <span class="lbl">#5bd0a0</span>
  </div></div><div style="display:flex;flex-direction:column;gap:6px">
  <div style="height:62px;border-radius:var(--r-md);background:#f0c466;border:1px solid var(--brand-line)"></div>
  <div style="display:flex;flex-direction:column;gap:1px">
    <span style="font-family:var(--font-mono);font-size:11px;color:var(--brand-text)">warn</span>
    <span class="lbl">#f0c466</span>
  </div></div><div style="display:flex;flex-direction:column;gap:6px">
  <div style="height:62px;border-radius:var(--r-md);background:#ff7373;border:1px solid var(--brand-line)"></div>
  <div style="display:flex;flex-direction:column;gap:1px">
    <span style="font-family:var(--font-mono);font-size:11px;color:var(--brand-text)">error</span>
    <span class="lbl">#ff7373</span>
  </div></div><div style="display:flex;flex-direction:column;gap:6px">
  <div style="height:62px;border-radius:var(--r-md);background:#36e0d4;border:1px solid var(--brand-line)"></div>
  <div style="display:flex;flex-direction:column;gap:1px">
    <span style="font-family:var(--font-mono);font-size:11px;color:var(--brand-text)">accent</span>
    <span class="lbl">#36e0d4</span>
  </div></div>
</div></body></html>
