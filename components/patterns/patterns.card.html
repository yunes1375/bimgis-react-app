<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 20px; background: var(--brand-bg-1); }
  .wrap { display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-start; }
  .micro-h { font-family: var(--font-mono); font-size: 9px; letter-spacing: .1em; text-transform: uppercase; color: var(--brand-faint); margin-bottom: 8px; }
  .grp { display: flex; flex-direction: column; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const NS = window.BIMGISBlueprintDesignSystem_f8b0c8;
const { FabPill, BasemapPicker, GpsAccuracyBadge, Button } = NS;
function Demo() {
  const [bm,setBm] = React.useState('sat');
  return (
    <div className="wrap">
      <div className="grp"><div className="micro-h">Map controls (FabPill)</div>
        <div className="row" style={{alignItems:'center'}}>
          <FabPill icon="◎">Locate</FabPill>
          <FabPill icon="⊞" active>3D Model</FabPill>
          <FabPill icon="↥">Layers</FabPill>
          <FabPill shape="circle" icon="+" aria-label="Zoom in" />
          <BasemapPicker value={bm} onChange={setBm} options={[
            {id:'sat',label:'Satellite',swatchColor:'#2c4a2c'},
            {id:'street',label:'Streets',swatchColor:'#3a3f4a'},
            {id:'dark',label:'Dark',swatchColor:'#11141d'},
          ]} />
        </div>
      </div>
      <div className="grp"><div className="micro-h">GPS accuracy (field survey)</div>
        <div className="row" style={{alignItems:'center'}}>
          <GpsAccuracyBadge accuracy={4} />
          <GpsAccuracyBadge accuracy={18} />
          <GpsAccuracyBadge accuracy={40} />
          <GpsAccuracyBadge accuracy={null} />
        </div>
      </div>
      <div className="row">
        <Button variant="secondary">Adjust alignment…</Button>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
