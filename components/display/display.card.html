<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 20px; background: var(--brand-bg-1); }
  .wrap { display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-start; }
  .micro-h { font-family: var(--font-mono); font-size: 9px; letter-spacing: .1em; text-transform: uppercase; color: var(--brand-faint); margin-bottom: 8px; }
  .grp { display: flex; flex-direction: column; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const NS = window.BIMGISBlueprintDesignSystem_f8b0c8;
const { Pill, Spinner, Tabs, Toast } = NS;
function Demo() {
  return (
    <div className="wrap">
      <div className="grp"><div className="micro-h">Pill — tones</div>
        <div className="row">
          <Pill tone="bim" dot>BIM</Pill>
          <Pill tone="gis" dot>GIS</Pill>
          <Pill tone="ok">Aligned</Pill>
          <Pill tone="warn">Drift</Pill>
          <Pill tone="error">Failed</Pill>
          <Pill tone="neutral">Draft</Pill>
        </div>
      </div>
      <div className="grp"><div className="micro-h">Spinner</div>
        <div className="row" style={{alignItems:'center'}}>
          <Spinner size="sm" /><Spinner size="md" /><Spinner size="lg" />
        </div>
      </div>
      <div className="grp"><div className="micro-h">Tabs</div>
        <Tabs items={[{value:'model',label:'Model',count:248},{value:'layers',label:'GIS Layers',count:12},{value:'issues',label:'Issues',count:3},{value:'log',label:'Log',disabled:true}]} defaultValue="layers" />
      </div>
      <div className="row">
        <Toast tone="success" title="Model georeferenced" description="Riverside Tower snapped to EPSG:3857." onClose={()=>{}} />
        <Toast tone="warn" title="Alignment drift" description="14 cm offset detected." action={{label:'Adjust',onClick:()=>{}}} />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
