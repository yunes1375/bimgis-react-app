<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Atlas Dashboard" description="BIM·GIS project dashboard — header, KPI strip, project cards on the blueprint backdrop" -->
<helmet>
<script src="./ds-base.js"></script>
</helmet>
<div style="position:relative;min-height:100vh;background:#090b11;color:#e8ecf1;font-family:'Inter',system-ui,sans-serif;display:flex;flex-direction:column">
  <div class="bp-grid-backdrop"></div>

  <x-import component-from-global-scope="BIMGISBlueprintDesignSystem_f8b0c8.SiteHeader" brand="BIM·GIS" tag="Atlas" nav="{{ nav }}" who="{{ who }}" hint-size="100%,40px"></x-import>

  <main style="position:relative;flex:1;width:100%;max-width:1080px;margin:0 auto;padding:28px 24px;box-sizing:border-box">
    <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap">
      <div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:#9aa7bd;margin-bottom:6px">Workspace</div>
        <h1 style="font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:600;letter-spacing:-0.01em;margin:0">Projects</h1>
      </div>
      <x-import component-from-global-scope="BIMGISBlueprintDesignSystem_f8b0c8.Button" variant="primary" leftIcon="+" hint-size="130px,30px">New project</x-import>
    </div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px">
      <x-import component-from-global-scope="BIMGISBlueprintDesignSystem_f8b0c8.KpiTile" label="Active projects" value="5" hint-size="100%,52px"></x-import>
      <x-import component-from-global-scope="BIMGISBlueprintDesignSystem_f8b0c8.KpiTile" label="Elements indexed" value="2,740" tone="ok" hint-size="100%,52px"></x-import>
      <x-import component-from-global-scope="BIMGISBlueprintDesignSystem_f8b0c8.KpiTile" label="Avg. drift" value="0.6 m" tone="warn" trend="{{ driftTrend }}" hint-size="100%,52px"></x-import>
      <x-import component-from-global-scope="BIMGISBlueprintDesignSystem_f8b0c8.KpiTile" label="Failed imports" value="1" tone="error" hint-size="100%,52px"></x-import>
    </div>

    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:14px">
      <sc-for list="{{ projects }}" as="p" hint-placeholder-count="4">
        <x-import component-from-global-scope="BIMGISBlueprintDesignSystem_f8b0c8.Card" variant="accent" title="{{ p.name }}" subtitle="{{ p.meta }}" hint-size="100%,120px">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:10px">
            <span style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:#9aa7bd">{{ p.drift }}</span>
            <x-import component-from-global-scope="BIMGISBlueprintDesignSystem_f8b0c8.Pill" tone="{{ p.tone }}" dot="{{ true }}" hint-size="80px,20px">{{ p.status }}</x-import>
          </div>
        </x-import>
      </sc-for>
    </div>
  </main>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      nav: [
        { href: '#', label: 'Projects', active: true },
        { href: '#', label: 'Map' },
        { href: '#', label: 'Issues' },
        { href: '#', label: 'Docs' },
      ],
      who: { name: 'Y. Rahimi', initials: 'YR' },
      driftTrend: { dir: 'down', text: '-12% wk' },
      projects: [
        { name: 'Riverside Tower', meta: 'IFC · 248 elements', drift: 'Drift 0.42 m', status: 'Aligned', tone: 'ok' },
        { name: 'Metro Line 7 — Phase B', meta: 'IFC · 1,820 elements', drift: 'Drift 1.10 m', status: 'Drift', tone: 'warn' },
        { name: 'Karaj Logistics Hub', meta: 'IFC · 512 elements', drift: 'Drift 0.08 m', status: 'Aligned', tone: 'ok' },
        { name: 'Heritage Bazaar Survey', meta: 'IFC · 64 elements', drift: 'Drift 3.40 m', status: 'Failed', tone: 'error' },
      ],
    };
  }
}
</script>
</body>
</html>
